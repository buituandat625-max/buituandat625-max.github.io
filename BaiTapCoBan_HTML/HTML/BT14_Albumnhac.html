<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Tập 14 - Album Nhạc Sơn Tùng M-TP</title>
    <style>
        /* Khung bao quanh viền đen theo đề bài */
        .album-box {
            width: 500px;
            border: 2px solid #000;
            padding: 20px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
            background-color: #fff;
        }

        /* Chữ chạy Nhạc Online màu đỏ nổi bật */
        marquee {
            color: #FF0000;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 20px;
            display: block;
        }

        /* Định dạng tên bài hát - Click mở tab mới */
        .song-name {
            color: #800080; /* Màu tím */
            text-decoration: underline;
            font-weight: bold;
            font-size: 16px;
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .song-name:hover {
            color: #ff5500;
        }

        /* Khung chứa trình phát nhạc SoundCloud */
        .player-item {
            margin-bottom: 20px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 15px;
        }

        .player-item:last-child {
            border-bottom: none;
        }

        .note {
            font-size: 12px;
            color: #777;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="album-box">
        <marquee behavior="scroll" direction="left" scrollamount="6">
            Nhạc Online
        </marquee>

        <div class="player-item">
            <a href="https://soundcloud.com/yuu1210/chung-ta-cua-tuong-lai" target="_blank" class="song-name">
                1. Chúng Ta Của Tương Lai
            </a>
            <iframe width="100%" height="120" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1768130814&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="player-item">
            <a href="https://soundcloud.com/vpoppamtio/noi-nay-co-anh" target="_blank" class="song-name">
                2. Nơi Này Có Anh
            </a>
            <iframe width="100%" height="120" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/308334317&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="player-item">
            <a href="https://soundcloud.com/beo-boi/ch-y-ngay-i-onionn-x-s-n-t-ng" target="_blank" class="song-name">
                3. Chạy Ngay Đi (Onionn x Sơn Tùng M-TP)
            </a>
            <iframe width="100%" height="120" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1262839522&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="player-item">
            <a href="https://soundcloud.com/tripled-duongdaiduong/son-tung-mtp-lac-troi-triple-d-remix" target="_blank" class="song-name">
                4. Lạc Trôi (Triple D Remix)
            </a>
            <iframe width="100%" height="120" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/341606513&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <p class="note">(Click vào tên bài hát để mở tab mới - Nhấn Play để nghe trực tiếp)</p>
    </div>

</body>
</html>
