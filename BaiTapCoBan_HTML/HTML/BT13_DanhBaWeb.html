<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DanhBaWeb.html</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .container {
    width: 600px;
    min-height: 450px;
    border: 2px solid #000;
    padding: 30px;
    position: relative;
    overflow: hidden; /* Để ảnh mờ không tràn ra ngoài viền */
    background: #fff;
}

.container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("../Images/anh nen bao chi.jpg");
    background-size: cover;
    background-position: center;
    
   
    filter: blur(2px); 
    opacity: 0.2;      
    
    z-index: 0; 
}

/* Đảm bảo nội dung chữ hiện lên trên lớp nền mờ */
.container > * {
    position: relative;
    z-index: 1;
}

        .title {
            text-align: center;
            color: blue;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .category {
            font-weight: bold;
            margin-top: 15px;
        }

        .links {
            margin-left: 30px;
            line-height: 1.6;
        }

        .links a {
            color: #333;
            text-decoration: underline;
        }

        .ads {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 10px;
        }

        .ads a img {
            width: 180px;
            height: auto;
            border: 1px solid #000;
        }

        .footer {
            border-top: 1px solid #ccc;
            padding-top: 10px;
            margin-top: 10px;
        }

        .footer a {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">DANH BẠ WEBSITE</div>

    <div class="category">Tin Tức</div>
    <div class="links">
        <a href="http://www.vnexpress.net" target="_blank">Tin tức việt nam</a> <br>
        <a href="http://www.tuoitre.com.vn" target="_blank">Báo tuổi trẻ</a>
    </div>

    <div class="category">Giải trí</div>
    <div class="links">
        <a href="http://www.nhacso.net" target="_blank">Nhạc số Online</a> <br>
        <a href="http://www.ngoisao.net" target="_blank">Giới thiệu ngôi sao</a>
    </div>

    <div class="category">Liên kết quảng cáo</div>
    <div class="ads">
        <a href="http://www.echip.com.vn" target="_blank">
            <img src="../Images/logo_echip.jpg" alt="eChip">
        </a>
        <a href="http://www.vietnamnet.vn" target="_blank">
            <img src="../Images/logo_vnn.jpg" alt="Vietnamnet">
        </a>
    </div>

    <div class="footer">
        Liên hệ: <a href="mailto:hpt7777@gmail.com">Gửi mail</a>
    </div>
</div>

</body>
</html>
