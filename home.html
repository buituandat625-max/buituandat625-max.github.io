<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Thông Tin Sinh Viên</title>
<style type="text/css">
body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background-color: #f8fafc;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.profile-card {
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    text-align: center;
    border: 1px solid #e2e8f0;
    max-width: 450px;
    width: 100%;
    box-sizing: border-box;
}
.icon-wrapper {
    width: 70px;
    height: 70px;
    background: #e6fffa;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}
.icon-wrapper svg {
    width: 35px;
    height: 35px;
    color: #10b981;
}
h2 {
    color: #102a43;
    font-size: 22px;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
}
.info-list {
    text-align: left;
    color: #486581;
    font-size: 15px;
    line-height: 2;
}
.info-item {
    border-bottom: 1px dashed #f0f4f8;
    padding: 6px 0;
}
</style>
</head>
<body>
    <div class="profile-card">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'></path></svg>
        </div>

            <div class="info-item"><b>Địa chỉ Email:</b> buituandat625@gmail.com</div>
        </div>
    </div>
</body>
</html>
